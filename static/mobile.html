<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charlotte AI Research – Activate Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #06090f;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      color: #e0e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 80px;
      text-align: center;
    }

    .tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #00c875;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 38px;
      font-weight: 800;
      color: #fff;
      line-height: 1.05;
      margin-bottom: 12px;
    }
    h1 .green { color: #00c875; }

    .sub {
      font-size: 15px;
      color: #5a7a90;
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 52px;
    }

    #btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #00c875;
      color: #000;
      font-family: inherit;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      padding: 20px 36px;
      cursor: pointer;
      width: 100%;
      max-width: 300px;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    #btn:active { transform: scale(0.96); }
    #btn:disabled {
      background: #0e2018;
      color: #2a5040;
      cursor: not-allowed;
    }

    /* arrow icon */
    #btn svg {
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    #btn:not(:disabled):hover svg { transform: translateX(3px); }

    #status {
      margin-top: 28px;
      font-size: 15px;
      min-height: 50px;
      line-height: 1.5;
      color: #3a5a70;
      max-width: 280px;
    }
    #status.ok    { color: #00c875; }
    #status.info  { color: #7ab4ff; }
    #status.err   { color: #ff6b6b; }

    .footer {
      position: fixed;
      bottom: 20px;
      font-size: 11px;
      color: #1e2e3a;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="tag">NinerGives 2026</div>
  <h1>Charlotte<br><span class="green">AI Research</span></h1>
  <p class="sub">Tap the button to start a 30-second live AI demo on the screen above you.</p>

  <button id="btn" onclick="activate()">
    Activate AI Demo
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </button>

  <div id="status"></div>

  <div class="footer">Demo runs 30s &nbsp;·&nbsp; No video is recorded or stored</div>

<script>
  const btn    = document.getElementById('btn');
  const status = document.getElementById('status');
  let countdownInterval = null;

  async function activate() {
    btn.disabled = true;
    status.className = '';
    status.textContent = 'Activating...';

    try {
      const res  = await fetch('/start', { method: 'POST' });
      const data = await res.json();

      if (data.status === 'started') {
        status.className = 'ok';
        status.textContent = 'Demo activated! Watch the screen.';
        startCountdown(30);
      } else if (data.status === 'already_active') {
        status.className = 'info';
        status.textContent = `Demo is already running (${data.remaining}s left).`;
        startCountdown(data.remaining);
      }
    } catch {
      status.className = 'err';
      status.textContent = 'Could not connect. Try again.';
      btn.disabled = false;
    }
  }

  function startCountdown(seconds) {
    clearInterval(countdownInterval);
    let s = seconds;
    countdownInterval = setInterval(() => {
      s--;
      if (s <= 0) {
        clearInterval(countdownInterval);
        btn.disabled = false;
        status.className = '';
        status.textContent = 'Demo ended. Tap to run again!';
      } else {
        status.textContent = `Running... ${s}s remaining`;
      }
    }, 1000);
  }
</script>
</body>
</html>
